# Pico 2W LTE Sensors for Home Assistant
#
# This package adds the following sensors from the SIM7600G-H module:
#   - Connection Type (LTE/WiFi/offline)
#   - Signal RSSI (dBm)
#   - Signal Quality (text)
#   - Network Operator
#   - Network Type
#   - GPS (latitude, longitude, altitude, speed)
#   - CPU Temperature
#   - Room Temperature
#   - Water Temperature
#   - Current 1-5
#   - Accelerometer Roll & Pitch (angle in degrees)
#   - Accelerometer Calibrate Button
#   - Accelerometer Measure Switch
#   - LED Switch
#   - Relay 1-4 Switches
#
# Installation:
#   1. Copy this file to your Home Assistant config/packages/ directory
#   2. Add to configuration.yaml:
#        homeassistant:
#          packages: !include_dir_named packages
#   3. Restart Home Assistant

mqtt:
  sensor:
    # Connection Type (LTE/WiFi/offline)
    - name: "Pico Connection Type"
      unique_id: "pico_connection_type"
      state_topic: "homeassistant/pico/sensor/connection_type"
      availability:
        topic: "homeassistant/pico/availability"
        payload_available: "online"
        payload_not_available: "offline"
      device:
        identifiers:
          - pico2w
        name: "Raspberry Pi Pico 2W"

    # Signal RSSI (dBm)
    - name: "Pico Signal RSSI"
      unique_id: "pico_signal_rssi"
      state_topic: "homeassistant/pico/sensor/signal_rssi"
      unit_of_measurement: "dBm"
      device_class: "signal_strength"
      availability:
        topic: "homeassistant/pico/availability"
        payload_available: "online"
        payload_not_available: "offline"
      device:
        identifiers:
          - pico2w
        name: "Raspberry Pi Pico 2W"

    # Signal Quality (text)
    - name: "Pico Signal Quality"
      unique_id: "pico_signal_quality"
      state_topic: "homeassistant/pico/sensor/signal_quality"
      availability:
        topic: "homeassistant/pico/availability"
        payload_available: "online"
        payload_not_available: "offline"
      device:
        identifiers:
          - pico2w
        name: "Raspberry Pi Pico 2W"

    # Network Operator
    - name: "Pico Network Operator"
      unique_id: "pico_network_operator"
      state_topic: "homeassistant/pico/sensor/network_operator"
      availability:
        topic: "homeassistant/pico/availability"
        payload_available: "online"
        payload_not_available: "offline"
      device:
        identifiers:
          - pico2w
        name: "Raspberry Pi Pico 2W"

    # Network Type (4G/3G/2G)
    - name: "Pico Network Type"
      unique_id: "pico_network_type"
      state_topic: "homeassistant/pico/sensor/network_type"
      availability:
        topic: "homeassistant/pico/availability"
        payload_available: "online"
        payload_not_available: "offline"
      device:
        identifiers:
          - pico2w
        name: "Raspberry Pi Pico 2W"

    # CPU Temperature
    - name: "Pico CPU Temperature"
      unique_id: "pico_cpu_temp"
      state_topic: "homeassistant/pico/sensor/cpu_temp"
      unit_of_measurement: "°C"
      device_class: "temperature"
      availability:
        topic: "homeassistant/pico/availability"
        payload_available: "online"
        payload_not_available: "offline"
      device:
        identifiers:
          - pico2w
        name: "Raspberry Pi Pico 2W"

    # Room Temperature
    - name: "Pico Room Temperature"
      unique_id: "pico_room_temp"
      state_topic: "homeassistant/pico/sensor/room_temp"
      unit_of_measurement: "°C"
      device_class: "temperature"
      availability:
        topic: "homeassistant/pico/availability"
        payload_available: "online"
        payload_not_available: "offline"
      device:
        identifiers:
          - pico2w
        name: "Raspberry Pi Pico 2W"

    # Water Temperature
    - name: "Pico Water Temperature"
      unique_id: "pico_water_temp"
      state_topic: "homeassistant/pico/sensor/water_temp"
      unit_of_measurement: "°C"
      device_class: "temperature"
      availability:
        topic: "homeassistant/pico/availability"
        payload_available: "online"
        payload_not_available: "offline"
      device:
        identifiers:
          - pico2w
        name: "Raspberry Pi Pico 2W"

    # Current 1 (raw - before offset)
    - name: "Pico Current 1 Raw"
      unique_id: "pico_current_1_raw"
      state_topic: "homeassistant/pico/sensor/current_1"
      unit_of_measurement: "A"
      device_class: "current"
      availability:
        topic: "homeassistant/pico/availability"
        payload_available: "online"
        payload_not_available: "offline"
      device:
        identifiers:
          - pico2w
        name: "Raspberry Pi Pico 2W"

    # Current 2 (raw - before offset)
    - name: "Pico Current 2 Raw"
      unique_id: "pico_current_2_raw"
      state_topic: "homeassistant/pico/sensor/current_2"
      unit_of_measurement: "A"
      device_class: "current"
      availability:
        topic: "homeassistant/pico/availability"
        payload_available: "online"
        payload_not_available: "offline"
      device:
        identifiers:
          - pico2w
        name: "Raspberry Pi Pico 2W"

    # Current 3 (raw - before offset)
    - name: "Pico Current 3 Raw"
      unique_id: "pico_current_3_raw"
      state_topic: "homeassistant/pico/sensor/current_3"
      unit_of_measurement: "A"
      device_class: "current"
      availability:
        topic: "homeassistant/pico/availability"
        payload_available: "online"
        payload_not_available: "offline"
      device:
        identifiers:
          - pico2w
        name: "Raspberry Pi Pico 2W"

    # Current 4 (raw - before offset)
    - name: "Pico Current 4 Raw"
      unique_id: "pico_current_4_raw"
      state_topic: "homeassistant/pico/sensor/current_4"
      unit_of_measurement: "A"
      device_class: "current"
      availability:
        topic: "homeassistant/pico/availability"
        payload_available: "online"
        payload_not_available: "offline"
      device:
        identifiers:
          - pico2w
        name: "Raspberry Pi Pico 2W"

    # Current 5 (raw - before offset)
    - name: "Pico Current 5 Raw"
      unique_id: "pico_current_5_raw"
      state_topic: "homeassistant/pico/sensor/current_5"
      unit_of_measurement: "A"
      device_class: "current"
      availability:
        topic: "homeassistant/pico/availability"
        payload_available: "online"
        payload_not_available: "offline"
      device:
        identifiers:
          - pico2w
        name: "Raspberry Pi Pico 2W"

    # Accelerometer Roll
    - name: "Pico Accel Roll"
      unique_id: "pico_accel_roll"
      state_topic: "homeassistant/pico/sensor/accel_roll"
      unit_of_measurement: "°"
      availability:
        topic: "homeassistant/pico/availability"
        payload_available: "online"
        payload_not_available: "offline"
      device:
        identifiers:
          - pico2w
        name: "Raspberry Pi Pico 2W"

    # Accelerometer Pitch
    - name: "Pico Accel Pitch"
      unique_id: "pico_accel_pitch"
      state_topic: "homeassistant/pico/sensor/accel_pitch"
      unit_of_measurement: "°"
      availability:
        topic: "homeassistant/pico/availability"
        payload_available: "online"
        payload_not_available: "offline"
      device:
        identifiers:
          - pico2w
        name: "Raspberry Pi Pico 2W"

    # GPS Latitude
    - name: "Pico GPS Latitude"
      unique_id: "pico_gps_latitude"
      state_topic: "homeassistant/device_tracker/pico2w/location"
      value_template: "{{ value_json.latitude | default(0) }}"
      unit_of_measurement: "°"
      availability:
        topic: "homeassistant/pico/availability"
        payload_available: "online"
        payload_not_available: "offline"
      device:
        identifiers:
          - pico2w
        name: "Raspberry Pi Pico 2W"

    # GPS Longitude
    - name: "Pico GPS Longitude"
      unique_id: "pico_gps_longitude"
      state_topic: "homeassistant/device_tracker/pico2w/location"
      value_template: "{{ value_json.longitude | default(0) }}"
      unit_of_measurement: "°"
      availability:
        topic: "homeassistant/pico/availability"
        payload_available: "online"
        payload_not_available: "offline"
      device:
        identifiers:
          - pico2w
        name: "Raspberry Pi Pico 2W"

    # GPS Altitude
    - name: "Pico GPS Altitude"
      unique_id: "pico_gps_altitude"
      state_topic: "homeassistant/device_tracker/pico2w/location"
      value_template: "{{ value_json.altitude | default(0) }}"
      unit_of_measurement: "m"
      device_class: "distance"
      availability:
        topic: "homeassistant/pico/availability"
        payload_available: "online"
        payload_not_available: "offline"
      device:
        identifiers:
          - pico2w
        name: "Raspberry Pi Pico 2W"

    # GPS Speed
    - name: "Pico GPS Speed"
      unique_id: "pico_gps_speed"
      state_topic: "homeassistant/device_tracker/pico2w/location"
      value_template: "{{ value_json.speed | default(0) }}"
      unit_of_measurement: "km/h"
      device_class: "speed"
      availability:
        topic: "homeassistant/pico/availability"
        payload_available: "online"
        payload_not_available: "offline"
      device:
        identifiers:
          - pico2w
        name: "Raspberry Pi Pico 2W"

  button:
    # Accelerometer Calibrate
    - name: "Pico Accel Calibrate"
      unique_id: "pico_accel_calibrate"
      command_topic: "homeassistant/pico/button/accel_calibrate/set"
      payload_press: "PRESS"
      availability:
        topic: "homeassistant/pico/availability"
        payload_available: "online"
        payload_not_available: "offline"
      device:
        identifiers:
          - pico2w
        name: "Raspberry Pi Pico 2W"

  switch:
    # Accelerometer Calibrate
    - name: "Pico Accel Calibrate"
      unique_id: "pico_accel_calibrate"
      command_topic: "homeassistant/pico/switch/accel_calibrate/set"
      state_topic: "homeassistant/pico/switch/accel_calibrate/state"
      payload_on: "ON"
      payload_off: "OFF"
      availability:
        topic: "homeassistant/pico/availability"
        payload_available: "online"
        payload_not_available: "offline"
      device:
        identifiers:
          - pico2w
        name: "Raspberry Pi Pico 2W"

    # Accelerometer Measure Toggle
    # Accelerometer Measure Toggle
    - name: "Pico Accel Measure"
      unique_id: "pico_accel_measure"
      command_topic: "homeassistant/pico/switch/accel_measure/set"
      state_topic: "homeassistant/pico/switch/accel_measure/state"
      payload_on: "ON"
      payload_off: "OFF"
      availability:
        topic: "homeassistant/pico/availability"
        payload_available: "online"
        payload_not_available: "offline"
      device:
        identifiers:
          - pico2w
        name: "Raspberry Pi Pico 2W"

    # LED Switch
    - name: "Pico LED"
      unique_id: "pico_led"
      command_topic: "homeassistant/pico/switch/led/set"
      state_topic: "homeassistant/pico/switch/led/state"
      payload_on: "ON"
      payload_off: "OFF"
      retain: true
      availability:
        topic: "homeassistant/pico/availability"
        payload_available: "online"
        payload_not_available: "offline"
      device:
        identifiers:
          - pico2w
        name: "Raspberry Pi Pico 2W"

    # Relay 1
    - name: "Pico Relay 1"
      unique_id: "pico_relay_1"
      command_topic: "homeassistant/pico/switch/relay_1/set"
      state_topic: "homeassistant/pico/switch/relay_1/state"
      payload_on: "ON"
      payload_off: "OFF"
      retain: true
      availability:
        topic: "homeassistant/pico/availability"
        payload_available: "online"
        payload_not_available: "offline"
      device:
        identifiers:
          - pico2w
        name: "Raspberry Pi Pico 2W"

    # Relay 2
    - name: "Pico Relay 2"
      unique_id: "pico_relay_2"
      command_topic: "homeassistant/pico/switch/relay_2/set"
      state_topic: "homeassistant/pico/switch/relay_2/state"
      payload_on: "ON"
      payload_off: "OFF"
      retain: true
      availability:
        topic: "homeassistant/pico/availability"
        payload_available: "online"
        payload_not_available: "offline"
      device:
        identifiers:
          - pico2w
        name: "Raspberry Pi Pico 2W"

    # Relay 3
    - name: "Pico Relay 3"
      unique_id: "pico_relay_3"
      command_topic: "homeassistant/pico/switch/relay_3/set"
      state_topic: "homeassistant/pico/switch/relay_3/state"
      payload_on: "ON"
      payload_off: "OFF"
      retain: true
      availability:
        topic: "homeassistant/pico/availability"
        payload_available: "online"
        payload_not_available: "offline"
      device:
        identifiers:
          - pico2w
        name: "Raspberry Pi Pico 2W"

    # Relay 4
    - name: "Pico Relay 4"
      unique_id: "pico_relay_4"
      command_topic: "homeassistant/pico/switch/relay_4/set"
      state_topic: "homeassistant/pico/switch/relay_4/state"
      payload_on: "ON"
      payload_off: "OFF"
      retain: true
      availability:
        topic: "homeassistant/pico/availability"
        payload_available: "online"
        payload_not_available: "offline"
      device:
        identifiers:
          - pico2w
        name: "Raspberry Pi Pico 2W"

  update:
    # Firmware Update Entity
    - name: "Pico Firmware"
      unique_id: "pico_firmware_update"
      state_topic: "homeassistant/pico/update/state"
      command_topic: "homeassistant/pico/update/cmd"
      payload_install: "PRESS"
      device_class: "firmware"
      availability:
        topic: "homeassistant/pico/availability"
        payload_available: "online"
        payload_not_available: "offline"
      device:
        identifiers:
          - pico2w
        name: "Raspberry Pi Pico 2W"

  device_tracker:
    # Pico 2W Location (GPS via MQTT JSON)
    - name: "Pico 2W Location"
      unique_id: "pico2w_location"
      state_topic: "homeassistant/pico/availability"
      json_attributes_topic: "homeassistant/device_tracker/pico2w/location"
      availability:
        topic: "homeassistant/pico/availability"
        payload_available: "online"
        payload_not_available: "offline"
      device:
        identifiers:
          - pico2w
        name: "Raspberry Pi Pico 2W"

input_number:
  pico_current_1_offset:
    name: "Pico Current 1 Offset"
    min: -5
    max: 5
    step: 0.01
    unit_of_measurement: "A"
    mode: slider
    icon: mdi:offset-horizontal

  pico_current_2_offset:
    name: "Pico Current 2 Offset"
    min: -5
    max: 5
    step: 0.01
    unit_of_measurement: "A"
    mode: slider
    icon: mdi:offset-horizontal

  pico_current_3_offset:
    name: "Pico Current 3 Offset"
    min: -5
    max: 5
    step: 0.01
    unit_of_measurement: "A"
    mode: slider
    icon: mdi:offset-horizontal

  pico_current_4_offset:
    name: "Pico Current 4 Offset"
    min: -5
    max: 5
    step: 0.01
    unit_of_measurement: "A"
    mode: slider
    icon: mdi:offset-horizontal

  pico_current_5_offset:
    name: "Pico Current 5 Offset"
    min: -5
    max: 5
    step: 0.01
    unit_of_measurement: "A"
    mode: slider
    icon: mdi:offset-horizontal

template:
  sensor:
    # Current 1 (with offset applied)
    - name: "Pico Current 1"
      unique_id: "pico_current_1_calibrated"
      state: "{{ states('sensor.raspberry_pi_pico_2w_pico_current_1_raw') | float(0) + states('input_number.pico_current_1_offset') | float(0) }}"
      unit_of_measurement: "A"
      device_class: "current"

    # Current 2 (with offset applied)
    - name: "Pico Current 2"
      unique_id: "pico_current_2_calibrated"
      state: "{{ states('sensor.raspberry_pi_pico_2w_pico_current_2_raw') | float(0) + states('input_number.pico_current_2_offset') | float(0) }}"
      unit_of_measurement: "A"
      device_class: "current"

    # Current 3 (with offset applied)
    - name: "Pico Current 3"
      unique_id: "pico_current_3_calibrated"
      state: "{{ states('sensor.raspberry_pi_pico_2w_pico_current_3_raw') | float(0) + states('input_number.pico_current_3_offset') | float(0) }}"
      unit_of_measurement: "A"
      device_class: "current"

    # Current 4 (with offset applied)
    - name: "Pico Current 4"
      unique_id: "pico_current_4_calibrated"
      state: "{{ states('sensor.raspberry_pi_pico_2w_pico_current_4_raw') | float(0) + states('input_number.pico_current_4_offset') | float(0) }}"
      unit_of_measurement: "A"
      device_class: "current"

    # Current 5 (with offset applied)
    - name: "Pico Current 5"
      unique_id: "pico_current_5_calibrated"
      state: "{{ states('sensor.raspberry_pi_pico_2w_pico_current_5_raw') | float(0) + states('input_number.pico_current_5_offset') | float(0) }}"
      unit_of_measurement: "A"
      device_class: "current"
